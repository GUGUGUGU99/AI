<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - AI Archive</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <header class="top-header">
    <div class="logo-area">
      <a href="/" class="logo-link">
        <div class="logo">AI</div>
      </a>
      <div>
        <h1>글쓰기</h1>
        <p>새 게시글을 작성합니다.</p>
      </div>
    </div>
  </header>

  <main class="layout">

    <form class="write-form" method="POST" action="/write" enctype="multipart/form-data" onsubmit="saveEditorContent()">

      <input type="text" name="author" placeholder="닉네임을 입력하세요" required>
      <input type="text" name="title" placeholder="제목을 입력하세요" required>

      <div class="editor-toolbar">
        <button type="button" onclick="formatText('bold')">굵게</button>
        <button type="button" onclick="formatText('italic')">기울임</button>
        <button type="button" onclick="formatText('underline')">밑줄</button>
        <button type="button" onclick="formatText('insertUnorderedList')">목록</button>

        <input type="number" id="fontSizeInput" value="16" min="8" max="80" class="font-size-input">
        <button type="button" onclick="applyFontSize()">글자 크기 적용</button>

        <button type="button" onclick="insertImage()">이미지 넣기</button>
      </div>

      <div id="editor" class="editor" contenteditable="true"></div>

      <input type="hidden" name="content" id="content">
      <input type="file" id="imageInput" accept="image/*" style="display:none">

      <div class="file-box">
        <label>다운로드용 파일 첨부</label>
        <input type="file" name="file">
      </div>

      <div class="write-area">
        <button type="submit" class="write-btn">등록하기</button>
      </div>

    </form>

  </main>

  <script src="{{ url_for('static', filename='editor.js') }}"></script>

</body>
</html>
